<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pour toi</title>
    <link rel="icon" type="image/jpeg" href="./images/logosite.JPEG" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="glow"></div>
    <div class="hearts" id="hearts" aria-hidden="true"></div>
    <canvas id="confetti" aria-hidden="true"></canvas>

    <main class="card" id="card">
      <div class="spark" aria-hidden="true"></div>
      <button class="backLink" id="step-back-btn" type="button" style="display:none;">← Retour</button>
      <img src="./images/logosite.JPEG" alt="Logo" class="site-logo" id="site-logo" />

      <h1>Oh princesse, j'ai une petite question !!!</h1>
      <p>C'est vraiment important !</p>

      <div class="btnRow" id="btnRow">
        <button class="btn" id="yes" type="button">Oui ❤️</button>
        <button class="btn" id="no" type="button">Non 😈</button>
        <span class="btn ghost" id="noGhost" aria-hidden="true">Non 😈</span>
      </div>

      <div class="footer">Essaie de cliquer sur non si tu peux.</div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
